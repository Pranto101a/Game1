      - লোকাল মাল্টিপ্লেয়ার (একাধিক মানুষ) হলে তলোয়ারবাজের ফলে কার্ডের নাম প্রকাশ না করা

    <script type="module">
      // --- Card count override (only Guard + Merchant) ---
      // NOTE: We store in sessionStorage (NOT localStorage) so it won't stay saved after leaving/reopening.
      const __JD_DEFAULT_COUNTS = { guard: 6, merchant: 2 };
      function __jdStorage() {
        try {
          return sessionStorage;
        } catch {
          return null;
        }
      }
      window.__jdGetCardCounts = function () {
        try {
          // Clear legacy persistence (older builds used localStorage)
          try { localStorage.removeItem("jd_card_counts"); } catch {}
          const store = __jdStorage();
          const raw = store ? store.getItem("jd_card_counts") : null;
          if (!raw) return { ...__JD_DEFAULT_COUNTS };
          const v = JSON.parse(raw);
          const g = Number.isFinite(+v.guard) ? Math.max(0, Math.min(20, Math.trunc(+v.guard))) : __JD_DEFAULT_COUNTS.guard;
          const m = Number.isFinite(+v.merchant) ? Math.max(0, Math.min(20, Math.trunc(+v.merchant))) : __JD_DEFAULT_COUNTS.merchant;
          return { guard: g, merchant: m };
        } catch {
          return { ...__JD_DEFAULT_COUNTS };
        }
      };
      window.__jdSetCardCounts = function (counts) {
        try {
          const g = Number.isFinite(+counts?.guard) ? Math.max(0, Math.min(20, Math.trunc(+counts.guard))) : __JD_DEFAULT_COUNTS.guard;
          const m = Number.isFinite(+counts?.merchant) ? Math.max(0, Math.min(20, Math.trunc(+counts.merchant))) : __JD_DEFAULT_COUNTS.merchant;
          const out = { guard: g, merchant: m };
          window.__jd_card_counts = out;
          // Clear legacy persistence + store only for this tab session
          try { localStorage.removeItem("jd_card_counts"); } catch {}
          const store = __jdStorage();
          try { store && store.setItem("jd_card_counts", JSON.stringify(out)); } catch {}
          return out;
        } catch {
          return { ...__JD_DEFAULT_COUNTS };
        }
      };
      window.__jdSetCardCounts(window.__jdGetCardCounts());

      // --- Tokens-to-win override (3-10) ---
      // If not set, the default rule will be used (based on number of players).
      const __JD_TOKENS_KEY = "jd_tokens_to_win_override";
      window.__jdGetTokensToWinOverride = function () {
        try {
          // Clear legacy persistence (older builds used localStorage)
          try { localStorage.removeItem(__JD_TOKENS_KEY); } catch {}
          const store = __jdStorage();
          const raw = store ? store.getItem(__JD_TOKENS_KEY) : null;
          if (!raw) return null;
          const n = Math.trunc(Number(raw));
          if (!Number.isFinite(n)) return null;
          if (n < 3 || n > 10) return null;
          return n;
        } catch {
          return null;
        }
      };
      window.__jdSetTokensToWinOverride = function (v) {
        try {
          const n = v == null ? null : Math.trunc(Number(v));
          if (n == null) {
            try { localStorage.removeItem(__JD_TOKENS_KEY); } catch {}
            const store = __jdStorage();
            try { store && store.removeItem(__JD_TOKENS_KEY); } catch {}
            window.__jd_tokens_to_win_override = null;
            return null;
          }
          if (!Number.isFinite(n) || n < 3 || n > 10) {
            try { localStorage.removeItem(__JD_TOKENS_KEY); } catch {}
            const store = __jdStorage();
            try { store && store.removeItem(__JD_TOKENS_KEY); } catch {}
            window.__jd_tokens_to_win_override = null;
            return null;
          }
          window.__jd_tokens_to_win_override = n;
          // Clear legacy persistence + store only for this tab session
          try { localStorage.removeItem(__JD_TOKENS_KEY); } catch {}
          const store = __jdStorage();
          try { store && store.setItem(__JD_TOKENS_KEY, String(n)); } catch {}
          return n;
        } catch {
          return null;
        }
      };

      // Reset সব অপশন (পাহারাদার/বণিক/টোকেন) — যাতে গেম শেষ/বের হলে আবার ডিফল্টে ফিরে আসে
      window.__jdResetGameOptions = function () {
        try { window.__jdSetCardCounts && window.__jdSetCardCounts(__JD_DEFAULT_COUNTS); } catch {}
        try { window.__jdSetTokensToWinOverride && window.__jdSetTokensToWinOverride(null); } catch {}
      };

      // --- Online rejoin reliability (BFCache / tab-switch issues) ---
      // If user leaves the website and comes back via browser back/recents, pages can be restored from BFCache.
      // In that case socket connections may be dead and the app won't respond until a manual refresh.
      // Fix: when returning to an online session, auto-reload once so the socket reconnects cleanly.
      (function fixOnlineBackForwardCache() {
        function hasOnlineSession() {
          try {
            return !!(sessionStorage.getItem("jd_online_room") && sessionStorage.getItem("jd_online_player_id") != null);
          } catch {
            return false;
          }
        }
        window.addEventListener("pageshow", (ev) => {
          try {
            if (!hasOnlineSession()) return;
            if (ev && ev.persisted) window.location.reload();
          } catch {}
        });
        document.addEventListener("visibilitychange", () => {
          try {
            if (!hasOnlineSession()) return;
            if (document.visibilityState === "visible") {
              // small delay so browser finishes restoring the page
              setTimeout(() => {
                try {
                  // if the app is "stuck" after returning, reload fixes socket + state
                  window.location.reload();
                } catch {}
              }, 300);
            }
          } catch {}
        });
      })();

      const entryUrl = new URL("./assets/index-Er7WoFSS.js?v=17", import.meta.url);
      const res = await fetch(entryUrl);
      let code = await res.text();

      // --- UI controls for Guard/Merchant counts (offline start + online lobby) ---
      // We inject a tiny DOM-based UI so we don't need to rebuild the bundled app.
      // Values are stored in sessionStorage via __jdSetCardCounts (auto-reset).
      (function setupCardCountControls() {
        const GUARD_OPTIONS = [1, 2, 3, 4, 5, 6];
        const MERCHANT_OPTIONS = [1, 2];
        const TOKEN_OPTIONS = [3, 4, 5, 6, 7, 8, 9, 10];

        function getCounts() {
          try {
            const raw = window.__jdGetCardCounts ? window.__jdGetCardCounts() : { guard: 6, merchant: 2 };
            const guard = GUARD_OPTIONS.includes(raw.guard) ? raw.guard : 6;
            const merchant = MERCHANT_OPTIONS.includes(raw.merchant) ? raw.merchant : 2;
            return { guard, merchant };
          } catch {
            return { guard: 6, merchant: 2 };
          }
        }
        function setCounts(next) {
          try {
            if (window.__jdSetCardCounts) return window.__jdSetCardCounts(next);
          } catch {}
          try {
            const store = __jdStorage();
            store && store.setItem("jd_card_counts", JSON.stringify(next));
          } catch {}
          return next;
        }

        function getTokensOverride() {
          try {
            const v = window.__jdGetTokensToWinOverride ? window.__jdGetTokensToWinOverride() : null;
            return TOKEN_OPTIONS.includes(v) ? v : null;
          } catch {
            return null;
          }
        }
        function setTokensOverride(v) {
          try {
            if (window.__jdSetTokensToWinOverride) return window.__jdSetTokensToWinOverride(v);
          } catch {}
          return null;
        }

        function makeOptionButtons({ options, selected, onSelect }) {
          const wrap = document.createElement("div");
          wrap.className = "flex gap-2 flex-wrap";
          for (const v of options) {
            const btn = document.createElement("button");
            btn.type = "button";
            const isSel = v === selected;
            btn.className =
              "w-12 h-12 rounded-xl font-black text-lg transition-all " +
              (isSel
                ? "bg-primary text-primary-foreground"
                : "bg-secondary text-secondary-foreground hover:bg-secondary/80");
            btn.textContent = String(v);
            btn.addEventListener("click", () => onSelect(v));
            wrap.appendChild(btn);
          }
          return wrap;
        }

        function mountControls({ root, mode }) {
          // mode: "offline" | "online"
          const id = mode === "offline" ? "jd-cardcount-controls-offline" : "jd-cardcount-controls-online";
          if (root.querySelector(`#${id}`)) return;

          const c = getCounts();
          const tok = getTokensOverride();

          const container = document.createElement("div");
          container.id = id;
          container.className = "mb-4 p-4 rounded-2xl bg-card/40 border border-border shadow";

          const title = document.createElement("p");
          title.className = "text-sm text-muted-foreground mb-3 font-black tracking-wide";
          title.textContent = mode === "offline" ? "কার্ড সেটিংস" : "কার্ড সেটিংস (অনলাইন)";

          // Host-only for online lobby
          let isHost = true;
          if (mode === "online") {
            try {
              isHost = sessionStorage.getItem("jd_online_player_id") === "0";
            } catch {
              isHost = false;
            }
          }

          const guardLabel = document.createElement("label");
          guardLabel.className = "block text-base text-foreground mb-2 font-black";
          guardLabel.textContent = "পাহারাদার (১–৬)";

          const merchantLabel = document.createElement("label");
          merchantLabel.className = "block text-base text-foreground mb-2 font-black";
          merchantLabel.textContent = "বণিক (১–২)";

          const tokensLabel = document.createElement("label");
          tokensLabel.className = "block text-base text-foreground mb-2 font-black";
          tokensLabel.textContent = "কত টোকেন পর্যন্ত খেলবেন? (৩–১০)";

          const guardWrap = document.createElement("div");
          guardWrap.className = "mb-4";
          const merchantWrap = document.createElement("div");
          merchantWrap.className = "mb-1";
          const tokensWrap = document.createElement("div");
          tokensWrap.className = "mb-1";

          function render() {
            const cur = getCounts();
            const curTok = getTokensOverride(); // null => default rule
            guardWrap.innerHTML = "";
            merchantWrap.innerHTML = "";
            tokensWrap.innerHTML = "";
            guardWrap.appendChild(guardLabel);
            merchantWrap.appendChild(merchantLabel);
            tokensWrap.appendChild(tokensLabel);

            const guardBtns = makeOptionButtons({
              options: GUARD_OPTIONS,
              selected: cur.guard,
              onSelect: (v) => {
                if (!isHost) return;
                setCounts({ ...cur, guard: v });
                render();
              }
            });
            const merchBtns = makeOptionButtons({
              options: MERCHANT_OPTIONS,
              selected: cur.merchant,
              onSelect: (v) => {
                if (!isHost) return;
                setCounts({ ...cur, merchant: v });
                render();
              }
            });

            const tokenBtns = makeOptionButtons({
              options: ["ডিফল্ট", ...TOKEN_OPTIONS],
              selected: curTok == null ? "ডিফল্ট" : curTok,
              onSelect: (v) => {
                if (!isHost) return;
                setTokensOverride(v === "ডিফল্ট" ? null : v);
                render();
              }
            });

            if (!isHost) {
              guardBtns.style.opacity = "0.5";
              merchBtns.style.opacity = "0.5";
              tokenBtns.style.opacity = "0.5";
              guardBtns.style.pointerEvents = "none";
              merchBtns.style.pointerEvents = "none";
              tokenBtns.style.pointerEvents = "none";
            }

            guardWrap.appendChild(guardBtns);
            merchantWrap.appendChild(merchBtns);
            tokensWrap.appendChild(tokenBtns);
          }

          render();

          container.appendChild(title);
          container.appendChild(guardWrap);
          container.appendChild(merchantWrap);
          container.appendChild(tokensWrap);

          if (mode === "online" && !isHost) {
            const note = document.createElement("p");
            note.className = "text-xs text-muted-foreground mt-3 font-bold";
            note.textContent = "শুধু হোস্ট এই সেটিংস পরিবর্তন করতে পারবেন।";
            container.appendChild(note);
          }

          // Insert:
          // - Offline: before "খেলা শুরু করুন" button
          // - Online lobby: before "বেরিয়ে যান" button (so exit stays at the bottom)
          const btnTextIncludes = (b, s) => (b?.textContent || "").includes(s);
          const insertBeforeBtn =
            mode === "online"
              ? Array.from(root.querySelectorAll("button")).find((b) => btnTextIncludes(b, "বেরিয়ে যান"))
              : Array.from(root.querySelectorAll("button")).find((b) => btnTextIncludes(b, "খেলা শুরু করুন"));
          if (insertBeforeBtn && insertBeforeBtn.parentElement) {
            insertBeforeBtn.parentElement.insertBefore(container, insertBeforeBtn);
          } else {
            root.appendChild(container);
          }
        }

        function ensureOffline() {
          const h2 = Array.from(document.querySelectorAll("h2")).find(
            (el) => el.textContent?.trim() === "নতুন খেলা"
          );
          if (!h2) return;
          const card = h2.closest(".bg-card") || h2.closest("div");
          if (!card) return;
          // Each time we come back to this screen, reset options to default
          if (!card.dataset.jdOptionsReset) {
            card.dataset.jdOptionsReset = "1";
            try { window.__jdResetGameOptions && window.__jdResetGameOptions(); } catch {}
          }
          mountControls({ root: card, mode: "offline" });
        }

        function ensureOnlineLobby() {
          const h2 = Array.from(document.querySelectorAll("h2")).find((el) => el.textContent?.trim() === "লবি");
          if (!h2) return;
          const card = h2.closest(".bg-card") || h2.closest("div");
          if (!card) return;
          // Each time we come back to lobby, reset options to default
          if (!card.dataset.jdOptionsReset) {
            card.dataset.jdOptionsReset = "1";
            try { window.__jdResetGameOptions && window.__jdResetGameOptions(); } catch {}
          }
          mountControls({ root: card, mode: "online" });
        }

        // Also reset when user exits or restarts from end screens
        function hookResetButtons() {
          // Reset only when leaving/starting fresh, NOT when restarting the same match.
          const resetTexts = ["বেরিয়ে যাও", "বেরিয়ে যান", "নতুন খেলা"];
          const btns = Array.from(document.querySelectorAll("button"));
          for (const b of btns) {
            const t = (b.textContent || "").trim();
            if (!t) continue;
            if (!resetTexts.some((s) => t.includes(s))) continue;
            if (b.dataset.jdResetHooked) continue;
            b.dataset.jdResetHooked = "1";
            b.addEventListener(
              "click",
              () => {
                try { window.__jdResetGameOptions && window.__jdResetGameOptions(); } catch {}
              },
              { capture: true }
            );
          }
        }

        function ensureAll() {
          try {
            ensureOffline();
            ensureOnlineLobby();
            hookResetButtons();
          } catch {}
        }

        let scheduled = false;
        function schedule() {
          if (scheduled) return;
          scheduled = true;
          requestAnimationFrame(() => {
            scheduled = false;
            ensureAll();
          });
        }

        ensureAll();
        const obs = new MutationObserver(schedule);
        obs.observe(document.documentElement, { childList: true, subtree: true });
        window.addEventListener("load", ensureAll);
      })();

      // 1) Reduce lag: cache white-noise buffer used by SFX
      const oldCt =
        'function ct(e,n,i,r,l=2e3,c=0){const f=e.sampleRate*.5,h=e.createBuffer(1,f,e.sampleRate),m=h.getChannelData(0);for(let g=0;g<f;g++)m[g]=(Math.random()*2-1)*n;const p=e.createBufferSource();p.buffer=h;const y=e.createBiquadFilter();if(y.type="lowpass",y.frequency.value=l,c>0){const g=e.createBiquadFilter();g.type="highpass",g.frequency.value=c,p.connect(g),g.connect(y)}else p.connect(y);y.connect(r),p.start(i)}';
      const newCt =
        'let __noiseBuf=null,__noiseSampleRate=0;function ct(e,n,i,r,l=2e3,c=0){const f=e.sampleRate*.5;let h=__noiseBuf;if(!h||__noiseSampleRate!==e.sampleRate){h=e.createBuffer(1,f,e.sampleRate);const p=h.getChannelData(0);for(let y=0;y<f;y++)p[y]=Math.random()*2-1;__noiseBuf=h,__noiseSampleRate=e.sampleRate}const m=e.createBufferSource();m.buffer=h;const g=e.createGain();g.gain.value=n;const p=e.createBiquadFilter();if(p.type="lowpass",p.frequency.value=l,c>0){const y=e.createBiquadFilter();y.type="highpass",y.frequency.value=c,m.connect(g),g.connect(y),y.connect(p)}else m.connect(g),g.connect(p);p.connect(r),m.start(i)}';
      if (code.includes(oldCt)) code = code.replace(oldCt, newCt);

      // 2) Remove swordsman log when no target (keep resultMessage)
      const oldNoTarget =
        'h.length===0&&["guard","ship_worker","swordsman","sailor"].includes(r)?(f=zt({...f,resultMessage:`কোনো বৈধ লক্ষ্য নেই — ${Te[r]} এর কোনো প্রভাব নেই।`},`${i.name} ${Te[r]} খেলেছেন — কোনো লক্ষ্য নেই।`),{...f,playStep:"show_result"})';
      const newNoTarget =
        'h.length===0&&["guard","ship_worker","swordsman","sailor"].includes(r)?(r==="swordsman"?{...f,resultMessage:`কোনো বৈধ লক্ষ্য নেই — ${Te[r]} এর কোনো প্রভাব নেই।`,playStep:"show_result"}:(f=zt({...f,resultMessage:`কোনো বৈধ লক্ষ্য নেই — ${Te[r]} এর কোনো প্রভাব নেই।`},`${i.name} ${Te[r]} খেলেছেন — কোনো লক্ষ্য নেই।`),{...f,playStep:"show_result"}))';
      if (code.includes(oldNoTarget)) code = code.replace(oldNoTarget, newNoTarget);

      // 3) Swordsman compare: do NOT reveal any card (and no log entry)
      const oldZj =
        'function Zj(e,n){const i=e.players[e.currentPlayerIndex],r=e.players[n],l=i.hand[0],c=r.hand[0],f=l?Rt[l]:-1,h=c?Rt[c]:-1;let m=e.players,p="";return f>h?(m=ur(m,n),p=`${i.name} (${l?Te[l]:"?"}) বনাম ${r.name} (${c?Te[c]:"?"}) — ${r.name} হেরেছেন!`):h>f?(m=ur(m,e.currentPlayerIndex),p=`${i.name} (${l?Te[l]:"?"}) বনাম ${r.name} (${c?Te[c]:"?"}) — ${i.name} হেরেছেন!`):p=`${i.name} বনাম ${r.name} — টাই! কেউ বাদ পড়েননি।`,{...zt({...e,players:m,resultMessage:p},p),playStep:"show_result"}}';
      const newZj =
        'function Zj(e,n){const i=e.players[e.currentPlayerIndex],r=e.players[n],l=i.hand[0],c=r.hand[0],f=l?Rt[l]:-1,h=c?Rt[c]:-1;let m=e.players,p="";return f>h?(m=ur(m,n),p=`${i.name} বনাম ${r.name} — ${r.name} হেরেছেন!`):h>f?(m=ur(m,e.currentPlayerIndex),p=`${i.name} বনাম ${r.name} — ${i.name} হেরেছেন!`):p=`${i.name} বনাম ${r.name} — টাই! কেউ বাদ পড়েননি।`,{...e,players:m,resultMessage:p,playStep:"show_result"}}';
      if (code.includes(oldZj)) code = code.replace(oldZj, newZj);

      // 4) Better randomness: use crypto-based RNG for deck/card shuffle (offline too)
      const oldShuffle =
